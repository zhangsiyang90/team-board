<script>
class _SQ{
  constructor(u,k,t){this.u=u;this.k=k;this.t=t;this.f=[];this.s='*';this.l=null;this.o=null;this.sg=false;this.m='GET';this.b=null;this.sc=false;}
  select(s){this.s=s;this.sc=true;return this;}
  eq(c,v){this.f.push(c+'=eq.'+encodeURIComponent(v));return this;}
  limit(n){this.l=n;return this;}
  order(c,{ascending:a=true}={}){this.o=c+'.'+(a?'asc':'desc');return this;}
  single(){this.sg=true;return this;}
  insert(d){this.m='POST';this.b=JSON.stringify(Array.isArray(d)?d:[d]);return this;}
  update(d){this.m='PATCH';this.b=JSON.stringify(d);return this;}
  delete(){this.m='DELETE';return this;}
  then(res){
    let ep=this.u+'/rest/v1/'+this.t,p=[];
    if(this.m==='GET'){p.push('select='+this.s);this.f.forEach(f=>p.push(f));if(this.l)p.push('limit='+this.l);if(this.o)p.push('order='+this.o);}
    else{this.f.forEach(f=>p.push(f));if(this.sc)p.push('select='+this.s);}
    if(p.length)ep+='?'+p.join('&');
    const h={'apikey':this.k,'Authorization':'Bearer '+this.k,'Content-Type':'application/json'};
    if(this.sg)h['Accept']='application/vnd.pgrst.object+json';
    const pr=[];
    if(this.m==='POST'||this.m==='PATCH')pr.push(this.sc||this.sg?'return=representation':'return=minimal');
    if(pr.length)h['Prefer']=pr.join(',');
    fetch(ep,{method:this.m,headers:h,body:this.b})
      .then(r=>r.text().then(t=>{try{return t?JSON.parse(t):null;}catch(e){return null;}}))
      .then(d=>{if(!d)return res({data:null,error:null});if(d.code)return res({data:null,error:d});res({data:this.sg?(Array.isArray(d)?d[0]:d):d,error:null});})
      .catch(e=>res({data:null,error:e}));
  }
}
window.supabase={createClient:(u,k)=>({from:t=>new _SQ(u,k,t)})};
</script>

// ===== STATE =====
let currentUser=null;
let currentModule=null;
let currentTableConfig=null;
let editingId=null;
let tableDataCache={};

// ===== AUTH =====
async function doLogin(){
  const name=document.getElementById('loginName').value.trim();
  const pw=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginError');
  err.classList.add('hidden');
  if(!name||!pw){err.textContent='请填写用户名和密码';err.classList.remove('hidden');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<i class="fa fa-spinner fa-spin mr-2"></i>登录中...';
  try{
    const{data,error}=await db.from('team_users').select('*').eq('name',name).eq('password',pw).single();
    if(error||!data){err.textContent='用户名或密码错误';err.classList.remove('hidden');}
    else{
      currentUser={id:data.id,name:data.name,role:data.role};
      localStorage.setItem('teamBoardUser',JSON.stringify(currentUser));
      showApp();
    }
  }catch(e){err.textContent='登录失败：'+e.message;err.classList.remove('hidden');}
  finally{btn.disabled=false;btn.innerHTML='<i class="fa fa-sign-in mr-2"></i>登录';}
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('teamBoardUser');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
}

// ===== INIT =====
async function init(){
  const stored=localStorage.getItem('teamBoardUser');
  if(stored){currentUser=JSON.parse(stored);showApp();}
  else{await ensureAdmin();}
}

async function ensureAdmin(){
  try{
    const{data}=await db.from('team_users').select('id').limit(1);
    if(!data||data.length===0){
      await db.from('team_users').insert({name:'admin',password:'admin123',role:'admin'});
    }
  }catch(e){console.log(e);}
}

function showApp(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('sidebarUsername').textContent=currentUser.name;
  document.getElementById('topUsername').textContent=currentUser.name;
  document.getElementById('userAvatar').textContent=currentUser.name[0];
  const isAdmin=currentUser.role==='admin';
  document.getElementById('sidebarRole').textContent=isAdmin?'管理员':'成员';
  document.getElementById('topRoleBadge').textContent=isAdmin?'管理员':'成员';
  buildNav();
  // Auto-navigate to first accessible module
  const mods=isAdmin?MODULES:MODULES.filter(m=>m.users.includes(currentUser.name));
  if(mods.length>0) navigateTo(mods[0].id);
  else showToast('暂无可访问模块','bg-yellow-500');
}

function buildNav(){
  const c=document.getElementById('navContainer');
  const isAdmin=currentUser.role==='admin';
  let html='<div class="text-indigo-400 text-xs font-semibold px-3 py-1 uppercase tracking-wider">管理模块</div>';
  MODULES.forEach(m=>{
    if(!isAdmin&&!m.users.includes(currentUser.name))return;
    html+=`<a onclick="navigateTo('${m.id}')" id="nav-${m.id}" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-indigo-100 text-sm">
      <i class="fa ${m.icon} w-5 text-center"></i><span>${m.name}</span>
      <span class="text-indigo-400 text-xs ml-auto">${m.subtitle}</span></a>`;
  });
  c.innerHTML=html;
}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('sidebarOverlay');
  s.classList.toggle('sidebar-mobile-hidden');
  o.classList.toggle('hidden');
}

// ===== NAVIGATION =====
function navigateTo(moduleId){
  currentModule=MODULES.find(m=>m.id===moduleId);
  if(!currentModule)return;
  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl=document.getElementById('nav-'+moduleId);
  if(navEl)navEl.classList.add('active');
  document.getElementById('pageTitle').textContent=currentModule.name+' - '+currentModule.subtitle;
  document.getElementById('mobileTitle').textContent=currentModule.name;
  renderModule();
  // Close sidebar on mobile
  if(window.innerWidth<768){
    document.getElementById('sidebar').classList.add('sidebar-mobile-hidden');
    document.getElementById('sidebarOverlay').classList.add('hidden');
  }
}

async function renderModule(){
  const c=document.getElementById('pageContent');
  const m=currentModule;
  const allTables=[...m.tables,...COMMON_TABLES.map(t=>({...t,table:t.table,extraFilter:{module_id:m.id}}))];

  let html='<div class="fade-in space-y-6">';
  // Module header
  html+=`<div class="bg-white rounded-xl p-5 card-shadow">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center"><i class="fa ${m.icon} text-indigo-500 text-lg"></i></div>
      <div><h3 class="font-bold text-gray-800 text-lg">${m.name}</h3><p class="text-gray-400 text-sm">${m.subtitle}</p></div>
    </div>
  </div>`;

  // Tabs for tables
  const tabId='tabs-'+m.id;
  html+=`<div class="bg-white rounded-xl card-shadow overflow-hidden">`;
  html+=`<div class="border-b overflow-x-auto flex" id="${tabId}">`;
  allTables.forEach((t,i)=>{
    const active=i===0?'border-b-2 border-indigo-500 text-indigo-600 font-semibold':'text-gray-500';
    html+=`<button onclick="switchTab('${m.id}',${i})" id="tab-${m.id}-${i}" class="px-4 py-3 text-sm whitespace-nowrap ${active} hover:text-indigo-600 transition-colors">${t.name}</button>`;
  });
  html+=`</div>`;
  html+=`<div id="tableContainer-${m.id}" class="p-4"><div class="text-center text-gray-400 py-8"><i class="fa fa-spinner fa-spin mr-2"></i>加载中...</div></div>`;
  html+=`</div></div>`;
  c.innerHTML=html;

  // Load first tab
  switchTab(m.id,0);
}

function switchTab(moduleId,index){
  const m=MODULES.find(mod=>mod.id===moduleId);
  const allTables=[...m.tables,...COMMON_TABLES.map(t=>({...t,table:t.table,extraFilter:{module_id:m.id}}))];
  const t=allTables[index];
  // Update tab styles
  allTables.forEach((_,i)=>{
    const el=document.getElementById('tab-'+moduleId+'-'+i);
    if(el){if(i===index){el.className='px-4 py-3 text-sm whitespace-nowrap border-b-2 border-indigo-500 text-indigo-600 font-semibold hover:text-indigo-600 transition-colors';}
    else{el.className='px-4 py-3 text-sm whitespace-nowrap text-gray-500 hover:text-indigo-600 transition-colors';}}
  });
  loadTable(t,moduleId);
}

async function loadTable(tConfig,moduleId){
  currentTableConfig=tConfig;
  const container=document.getElementById('tableContainer-'+moduleId);
  if(!container)return;

  let query=db.from(tConfig.table).select('*').order('created_at',{ascending:false}).limit(200);
  // Apply filters
  if(tConfig.filter){Object.entries(tConfig.filter).forEach(([k,v])=>query=query.eq(k,v));}
  if(tConfig.extraFilter){Object.entries(tConfig.extraFilter).forEach(([k,v])=>query=query.eq(k,v));}

  const{data,error}=await query;
  if(error){container.innerHTML='<div class="text-red-500 text-sm p-4">加载失败: '+error.message+'</div>';return;}

  tableDataCache[tConfig.id]=data||[];
  renderTableData(tConfig,data||[],container);
}

function renderTableData(tConfig,data,container){
  const cols=tConfig.cols;
  const isAdmin=currentUser.role==='admin';
  let html=`<div class="flex items-center justify-between mb-4">
    <div class="text-sm text-gray-500">共 ${data.length} 条记录</div>
    <button onclick="openCrudModal(null)" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium">
      <i class="fa fa-plus mr-1"></i>新增
    </button>
  </div>`;

  if(data.length===0){
    html+='<div class="text-center text-gray-400 py-12"><i class="fa fa-inbox text-4xl mb-3 block"></i>暂无数据</div>';
  }else{
    html+='<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-gray-50">';
    html+='<th class="px-3 py-2.5 text-left text-gray-600 font-medium rounded-tl-lg">#</th>';
    cols.forEach(c=>{html+=`<th class="px-3 py-2.5 text-left text-gray-600 font-medium">${c.label}</th>`;});
    html+='<th class="px-3 py-2.5 text-right text-gray-600 font-medium rounded-tr-lg">操作</th>';
    html+='</tr></thead><tbody>';
    data.forEach((row,i)=>{
      html+=`<tr class="border-b border-gray-100 hover:bg-gray-50/50">`;
      html+=`<td class="px-3 py-2.5 text-gray-400">${i+1}</td>`;
      cols.forEach(c=>{
        const v=row[c.key];
        let display='';
        if(c.type==='select'&&v){
          const tagClass=getTagClass(v);
          display=`<span class="tag ${tagClass}">${v}</span>`;
        }else if(c.type==='textarea'&&v){
          display=`<span class="text-gray-600" title="${escHtml(v)}">${escHtml(v.length>30?v.substring(0,30)+'...':v)}</span>`;
        }else if(c.type==='number'&&v!==null&&v!==undefined){
          display=`<span class="font-medium">${v}</span>`;
        }else{
          display=escHtml(v||'');
        }
        html+=`<td class="px-3 py-2.5">${display}</td>`;
      });
      html+=`<td class="px-3 py-2.5 text-right">
        <button onclick="openCrudModal('${row.id}')" class="text-indigo-500 hover:text-indigo-700 text-xs mr-2"><i class="fa fa-edit"></i> 编辑</button>
        <button onclick="deleteRow('${row.id}')" class="text-red-400 hover:text-red-600 text-xs"><i class="fa fa-trash"></i> 删除</button>
      </td>`;
      html+='</tr>';
    });
    html+='</tbody></table></div>';
  }
  container.innerHTML=html;
}

function getTagClass(val){
  const green=['已完成','通过','充足','已就位','已发布','是','已入职'];
  const yellow=['进行中','编写中','拍摄中','整理中','已排期','面试中','良','已确认','预警'];
  const red=['未通过','缺货','差','紧急','需修改'];
  const blue=['待处理','待编写','待拍摄','待确认','未准备','待发布','招聘中','待开始','一般'];
  if(green.includes(val))return 'tag-green';
  if(yellow.includes(val))return 'tag-yellow';
  if(red.includes(val))return 'tag-red';
  if(blue.includes(val))return 'tag-blue';
  return 'tag-gray';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ===== CRUD MODAL =====
function openCrudModal(id){
  editingId=id;
  const t=currentTableConfig;
  const isEdit=!!id;
  document.getElementById('crudModalTitle').textContent=isEdit?'编辑记录':'新增记录';
  document.getElementById('crudError').classList.add('hidden');

  let row={};
  if(isEdit){
    const data=tableDataCache[t.id]||[];
    row=data.find(r=>r.id===id)||{};
  }

  let fieldsHtml='';
  t.cols.forEach(c=>{
    const val=row[c.key]||'';
    fieldsHtml+=`<div><label class="block text-sm font-medium text-gray-700 mb-1">${c.label}</label>`;
    if(c.type==='select'){
      fieldsHtml+=`<select id="field-${c.key}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">`;
      fieldsHtml+=`<option value="">请选择</option>`;
      (c.options||[]).forEach(o=>{fieldsHtml+=`<option value="${o}" ${val===o?'selected':''}>${o}</option>`;});
      fieldsHtml+=`</select>`;
    }else if(c.type==='textarea'){
      fieldsHtml+=`<textarea id="field-${c.key}" rows="3" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none">${escHtml(val)}</textarea>`;
    }else{
      fieldsHtml+=`<input id="field-${c.key}" type="${c.type==='number'?'number':'text'}" value="${escHtml(val)}" ${c.type==='date'||c.type==='datetime-local'||c.type==='time'?'type="'+c.type+'"':''} class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"/>`;
    }
    fieldsHtml+=`</div>`;
  });
  document.getElementById('crudFormFields').innerHTML=fieldsHtml;
  document.getElementById('crudModal').classList.remove('hidden');
}

function closeCrudModal(){
  document.getElementById('crudModal').classList.add('hidden');
  editingId=null;
}

async function saveCrud(){
  const t=currentTableConfig;
  const record={};
  t.cols.forEach(c=>{
    const el=document.getElementById('field-'+c.key);
    if(!el)return;
    let v=el.value;
    if(c.type==='number'&&v!=='')v=parseFloat(v);
    record[c.key]=v||null;
  });

  // Add filter fields
  if(t.filter){Object.assign(record,t.filter);}
  if(t.extraFilter){Object.assign(record,t.extraFilter);}

  const errEl=document.getElementById('crudError');
  errEl.classList.add('hidden');
  const btn=document.getElementById('crudSaveBtn');
  btn.disabled=true;btn.textContent='保存中...';

  try{
    let result;
    if(editingId){
      result=await db.from(t.table).update(record).eq('id',editingId).select('*').single();
    }else{
      result=await db.from(t.table).insert(record).select('*').single();
    }
    if(result.error){errEl.textContent='保存失败: '+result.error.message;errEl.classList.remove('hidden');return;}
    closeCrudModal();
    showToast(editingId?'已更新':'已添加','bg-green-500');
    // Reload current tab
    const m=currentModule;
    const allTables=[...m.tables,...COMMON_TABLES.map(ct=>({...ct,table:ct.table,extraFilter:{module_id:m.id}}))];
    const idx=allTables.findIndex(x=>x.id===t.id);
    if(idx>=0)switchTab(m.id,idx);
  }catch(e){errEl.textContent='保存失败: '+e.message;errEl.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent='保存';}
}

async function deleteRow(id){
  if(!confirm('确定要删除这条记录吗？'))return;
  const t=currentTableConfig;
  const{error}=await db.from(t.table).delete().eq('id',id);
  if(error){showToast('删除失败','bg-red-500');return;}
  showToast('已删除','bg-green-500');
  const m=currentModule;
  const allTables=[...m.tables,...COMMON_TABLES.map(ct=>({...ct,table:ct.table,extraFilter:{module_id:m.id}}))];
  const idx=allTables.findIndex(x=>x.id===t.id);
  if(idx>=0)switchTab(m.id,idx);
}

// ===== UTILS =====
function showToast(msg,bg='bg-indigo-500'){
  const t=document.getElementById('toast');
  t.className=`fixed bottom-6 right-6 z-[100] px-5 py-3 rounded-xl text-white text-sm font-medium card-shadow ${bg}`;
  t.textContent=msg;t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),3000);
}

function closeModal(id){document.getElementById(id).classList.add('hidden');}

init();
